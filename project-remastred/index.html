<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page - PGR Database</title>
    <!-- Pemisahan file CSS per komponen sudah bagus untuk modularitas -->
    <link rel="stylesheet" href="asset/componen/navbar.css">
    <link rel="stylesheet" href="asset/componen/card.css">
    <link rel="stylesheet" href="asset/main-css/style.css">
    <link rel="stylesheet" href="asset/componen/footer.css">
    <link rel="stylesheet" href="asset/componen/fitur.css">
</head>
<body>

    <!-- SECTION 1: HEADER UTAMA (Tombol Menu & Search Bar) -->
    <div class="header">
        <button id="menuToggle" class="menu-btn">
            &#9776; <!-- Icon hamburger menu -->
        </button>
        <div class="container-search">
            <input type="text" placeholder="Search..." class="search-input">
            <button class="search-button">Search</button>
        </div>
    </div>

    <!-- SECTION 2: SIDEBAR NAVIGATION -->
    <div id="navContainer" class="nav-container">
        <nav class="navbar">
            <h2 class="header-nav">Main Menu</h2>
            <ul>
                <li><a href="/">Home</a></li>
                <!-- PERBAIKAN: Typo fixed, sebelumnya 'caracter.html' (kurang h) -->
                <li><a href="/character.html">Character</a></li>
                <li><a href="/">Weapons</a></li>
                <li><a href="/">CUB</a></li>
                <li><a href="/">Wallpaper</a></li>
                <li><a href="/">Guide</a></li>
            </ul>
        </nav>
    </div>

    <!-- SECTION 3: HERO BANNER -->
    <div class="banner">
        <img src="asset/img/image/pgr.png" alt="Punishing Gray Raven Banner">
        <div class="overlay">
            <h1 class="title">
                PUNISHER:<br>
                GRAY RAVEN
            </h1>
            <p class="paragraft">Database karakter, weapon, dan guide lengkap<br>untuk Commandant.</p>

            <!-- PERBAIKAN: Memindahkan class .sub-title langsung ke tag <a>.
                 Kalau tag <a> dibungkus div, warna teks link bakal default biru & hanya teksnya yang bisa diklik.
                 Dengan begini, seluruh area box tombol biru otomatis menjadi link aktif yang bisa diklik. -->
            <a href="/character.html" class="sub-title">Lihat Karakter</a>
        </div>
    </div>

    <!-- SECTION 4: MAIN CONTENT CONTAINER (Flexbox Utama) -->
    <div class="container-flex">
        
        <!-- SUB-SECTION A: LATEST VIDEO LAYER -->
        <div class="container-video">
            <h2 class="title-video">LATEST ANIMATED SHORT</h2>
            <div class="video-style">
                <!-- Atribut width dan height bawaan YouTube tetap aman karena di CSS sudah ditimpa oleh aspect-ratio -->
                <iframe width="560" height="315" 
                        src="https://www.youtube.com/embed/fEaRoxBl2Rg?si=h5wjz3pbAclRCoX9" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- SUB-SECTION B: CHARACTER GRID CARDS -->
        <div class="container-card">
            <!-- Judul ini dipaksa width: 100% di CSS agar tidak sejajar dengan kartu-kartu di bawahnya -->
            <h2 class="title-card">KARAKTER UNGGULAN</h2>
            
            <!-- CARD 1 -->
            <div class="main-card">
                <img src="/asset/img/profil-character/Character-CrimsonWeave-Portrait.png" alt="Lucia Crimson Weave">
                <!-- Overlay memegang z-index dan background hitam gradasi -->
                <div class="overlay-card">
                    <!-- Text berada di layer teratas di dalam card -->
                    <h3 class="name-karakter">Lucia: Crimson Weave</h3> 
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="main-card">
                <img src="/asset/img/profil-character/Character-CrimsonWeave-Portrait.png" alt="Lucia Crimson Weave">
                <div class="overlay-card">
                    <h3 class="name-karakter">Lucia: Crimson Weave</h3> 
                </div>
            </div>

            <!-- CARD 3 -->
            <div class="main-card">
                <img src="/asset/img/profil-character/Character-CrimsonWeave-Portrait.png" alt="Lucia Crimson Weave">
                <div class="overlay-card">
                    <h3 class="name-karakter">Lucia: Crimson Weave</h3> 
                </div>
            </div>
            <div class="footer-top">
        <!-- Isi konten footer atas lo di sini nanti -->
            </div>
        </div> <!-- Akhir dari .container-card -->

    </div> <!-- Akhir dari .container-flex -->

    <!-- PERBAIKAN: Elemen .footer-top dipindahkan ke sini (keluar dari .container-card).
         Jika dibiarkan di dalam container-card, dia akan terbaca oleh flexbox sebagai item grid 
         dan mengacaukan urutan susunan kartu karakter lo. -->
    >

    <!-- Script ditaruh di paling bawah sebelum close body agar HTML ter-render sepenuhnya dulu baru JS dimuat -->
    <script src="asset/js/main.js"></script>
</body>
</html>
